<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="0; url=./familiers/pykur/index.html?view=desktop">
<title>Redirection vers Pykur Tracker</title>
<link rel="icon" type="image/png" href="./familiers/pykur/assets/images/logo.png">
<script>
(function(){
  const url=new URL("./familiers/pykur/index.html",location.href);
  const params=new URLSearchParams(location.search);
  params.forEach((value,key)=>url.searchParams.set(key,value));
  if(!url.searchParams.has("view"))url.searchParams.set("view","desktop");
  location.replace(url.href);
})();
</script>
</head>
<body>
<p>Redirection vers <a href="./familiers/pykur/index.html?view=desktop">Pykur Tracker</a>...</p>
</body>
