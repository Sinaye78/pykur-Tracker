# Compression and cache policy shared by Familier Tracker static files.
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/xml
  application/json
  application/javascript
  application/xml
  application/xml+rss
  image/svg+xml;

map $sent_http_content_type $familier_tracker_expires {
  default                    off;
  text/html                  epoch;
  # CSS and JavaScript filenames are not content-hashed. Revalidate them on
  # navigation so a deployment can never leave an obsolete application cached.
  text/css                   -1;
  application/javascript     -1;
  ~image/                    30d;
  ~audio/                    30d;
  ~font/                     30d;
}

expires $familier_tracker_expires;
